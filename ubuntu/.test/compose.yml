services:
  ubuntu-install:
    build:
      context: ../..
      dockerfile: ubuntu/.test/Dockerfile
    command:
      [
        "bash",
        "-lc",
        "bash ./_install.sh && touch /home/dotfiles/.dotfiles-install-complete && sleep infinity",
      ]
    container_name: dotfiles-ubuntu-install
    environment:
      HOMEBREW_NO_ENV_HINTS: "1"
    healthcheck:
      test: ["CMD-SHELL", "test -f /home/dotfiles/.dotfiles-install-complete"]
      interval: 5s
      timeout: 5s
      retries: 240
    platform: linux/amd64
    volumes:
      - ../..:/home/dotfiles/dotfiles:ro
      - /home/linuxbrew/.linuxbrew
      - /home/dotfiles/.cache
    working_dir: /home/dotfiles/dotfiles/ubuntu
